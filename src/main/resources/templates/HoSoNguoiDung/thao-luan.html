<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Thảo Luận Cộng Đồng - NewsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981; /* Đổi sang màu xanh lá đặc trưng cho Thảo luận */
            --dark: #0f172a;
            --border: #e2e8f0;
            --bg: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--dark); line-height: 1.6; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header khu vực thảo luận */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #fff; padding: 20px 30px; border-radius: 16px; border: 1px solid var(--border); }
        .header-left h1 { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .back-link { color: #64748b; text-decoration: none; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .back-link:hover { color: var(--dark); }
        .btn-create { background: var(--primary); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; text-decoration: none; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-create:hover { background: #059669; }

        /* Danh sách bài viết bài đăng */
        .discussion-list { display: flex; flex-direction: column; gap: 20px; }
        .discussion-card { background: #fff; border-radius: 16px; padding: 25px; border: 1px solid var(--border); display: flex; gap: 20px; transition: 0.3s; }
        .discussion-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .post-img { width: 180px; height: 120px; object-fit: cover; border-radius: 12px; background: #e2e8f0; }
        .post-content { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .post-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .post-title a { text-decoration: none; color: var(--dark); transition: 0.2s; }
        .post-title a:hover { color: var(--primary); }
        .post-summary { color: #64748b; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
        .post-meta { display: flex; gap: 15px; font-size: 12px; color: #94a3b8; font-weight: 500; }
        .meta-author { color: #475569; font-weight: 600; }
        .no-post { text-align: center; padding: 50px; color: #64748b; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <header class="page-header">
        <div class="header-left">
            <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ tin tức</a>
            <h1>💬 Góc Thảo Luận Cộng Đồng</h1>
        </div>
        <a th:href="@{/create-post}" class="btn-create"><i class="fa-solid fa-pen-to-square"></i> Tham gia đăng bài</a>
    </header>

    <main class="discussion-list">
        <article class="discussion-card" th:each="post : ${discussionPosts}">
            <img class="post-img" th:src="${post.imageUrl != null && post.imageUrl != '' ? post.imageUrl : 'https://picsum.photos/300/200'}" alt="Ảnh minh họa">
            <div class="post-content">
                <div>
                    <h3 class="post-title">
                        <a th:href="@{/tin-tuc/{id}(id=${post.id})}" th:text="${post.title}">Tiêu đề bài viết thảo luận</a>
                    </h3>
                    <p class="post-summary" th:text="${post.summary}">Tóm tắt nội dung bài viết...</p>
                </div>
                <div class="post-meta">
                    <span>Người đăng: <span class="meta-author" th:text="${post.author != null ? post.author : 'Ẩn danh'}">Tác giả</span></span>
                    <span>•</span>
                    <span>Danh mục phụ: <span th:text="${post.description != null ? post.description : 'Chung'}">Chủ đề</span></span>
                </div>
            </div>
        </article>

        <div class="no-post bg-white rounded-2xl border border-gray-100" th:if="${discussionPosts == null or discussionPosts.isEmpty()}">
            <p>Hiện tại chưa có bài thảo luận nào. Hãy là người đầu tiên chia sẻ câu chuyện nhé!</p>
        </div>
    </main>
</div>

</body>
</html>
