<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa người dùng</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#eff6ff,#dbeafe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .card{
            width:100%;
            max-width:520px;
            background:#fff;
            border-radius:28px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,0.08);
            border:1px solid #e2e8f0;
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .title h2{
            font-size:32px;
            color:#0f172a;
            font-weight:800;
            margin-bottom:8px;
        }

        .title p{
            color:#64748b;
            font-size:14px;
        }

        .role-box{
            background:#eff6ff;
            color:#1d4ed8;
            border:1px solid #bfdbfe;
            padding:14px;
            border-radius:14px;
            font-size:13px;
            font-weight:600;
            margin-bottom:28px;
            text-align:center;
        }

        .form-group{
            margin-bottom:22px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            color:#334155;
            font-weight:700;
            font-size:14px;
        }

        .form-control{
            width:100%;
            padding:14px 16px;
            border:1px solid #cbd5e1;
            border-radius:14px;
            outline:none;
            font-size:15px;
            transition:0.3s;
            background:#fff;
        }
        
        select.form-control{
    cursor:pointer;
    background:white;
}
    

        .form-control:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 4px rgba(37,99,235,0.15);
        }

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:16px;
            background:#2563eb;
            color:white;
            font-size:15px;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .btn:hover{
            background:#1d4ed8;
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(37,99,235,0.25);
        }

        .back{
            display:block;
            text-align:center;
            margin-top:24px;
            text-decoration:none;
            color:#2563eb;
            font-size:14px;
            font-weight:600;
            transition:0.2s;
        }

        .back:hover{
            color:#1d4ed8;
            text-decoration:underline;
        }

        @media(max-width:600px){
            .card{
                padding:28px;
            }

            .title h2{
                font-size:26px;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="title">
        <h2>👤 Sửa người dùng</h2>
        <p>Cập nhật thông tin tài khoản trong hệ thống</p>
    </div>

    <div class="role-box">
        Quản trị viên có thể chỉnh sửa thông tin tài khoản người dùng
    </div>

    <form th:action="@{/admin/users/save}" method="post">

        <input type="hidden" name="id" th:value="${user.id}">

        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text"
                   name="username"
                   class="form-control"
                   th:value="${user.username}"
                   placeholder="Nhập tên đăng nhập">
        </div>

        <div class="form-group">
            <label>Địa chỉ email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   th:value="${user.email}"
                   placeholder="Nhập email">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="text"
                   name="password"
                   class="form-control"
                   th:value="${user.password}"
                   placeholder="Nhập mật khẩu">
        </div>

        <div class="form-group">
    <label>Vai trò</label>

    <select name="role" class="form-control">
        <option value="USER"
                th:selected="${user.role == 'USER'}">
            Người dùng
        </option>

        <option value="ADMIN"
                th:selected="${user.role == 'ADMIN'}">
            Quản trị viên
        </option>
    </select>
</div>

        <button type="submit" class="btn">
            💾 Cập nhật người dùng
        </button>

    </form>

    <a th:href="@{/admin/users}" class="back">
        ← Quay lại danh sách người dùng
    </a>

</div>

</body>
</html>
