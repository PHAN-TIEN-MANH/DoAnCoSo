<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${post != null && post.id != null ? 'Chỉnh sửa bài viết' : 'Đăng bài viết mới'}">NewsApp - Đăng bài</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .form-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 50px; margin-bottom: 50px; }
        .btn-primary { background-color: #2563eb; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; transition: 0.3s; }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-1px); }
        .form-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="container">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-8 form-container">
            <h2 class="mb-2 fw-bold text-dark" th:text="${post != null && post.id != null ? 'Chỉnh sửa bài viết' : 'Đăng bài viết mới'}">Đăng bài viết</h2>
            <hr class="mb-4 opacity-50">

            <form th:action="@{/admin/posts/save}" th:object="${post}" method="post">
                
                <input type="hidden" th:if="${post != null}" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-bold">Tiêu đề bài viết</label>
                    <input type="text" th:field="*{title}" class="form-control" placeholder="Nhập tiêu đề..." required>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tác giả</label>
                        <input type="text" th:field="*{author}" class="form-control" placeholder="Tên tác giả" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Chuyên mục</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="">-- Chọn chuyên mục --</option>
                            <option th:each="cat : ${categories}" 
                                    th:value="${cat.id}" 
                                    th:text="${cat.name}"
                                    th:selected="${post != null && post.category != null && post.category.id == cat.id}">
                            </option>
                        </select> 
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Mô tả ngắn</label>
                    <textarea th:field="*{summary}" class="form-control" rows="2"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Nội dung chi tiết</label>
                    <textarea th:field="*{content}" class="form-control" rows="10"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Link ảnh minh họa</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="URL ảnh...">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-paper-plane me-1"></i>
                        <span th:text="${post != null && post.id != null ? 'Cập nhật' : 'Xuất bản'}">Lưu</span>
                    </button>
                    <a th:href="@{/admin/posts}" class="btn btn-light" style="border: 1px solid #e2e8f0;">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
