<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa bài viết</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f9; }
        .form-container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="mb-4">Chỉnh sửa bài viết</h2>
        
        <form th:action="@{/admin/posts/save}" th:object="${post}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label fw-bold text-uppercase small">Tiêu đề bài viết</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Nhập tiêu đề..." required />
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold text-uppercase small">Tác giả</label>
                    <input type="text" th:field="*{author}" class="form-control" placeholder="Tên tác giả" />
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold text-uppercase small">Chuyên mục</label>
                    <select name="categoryId" class="form-select">
                        <option value="">-- Chọn chuyên mục --</option>
                        <option th:each="cat : ${categories}" 
                                th:value="${cat.id}" 
                                th:text="${cat.name}"
                                th:selected="${post.category != null && post.category.id == cat.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold text-uppercase small">Mô tả ngắn</label>
                <textarea th:field="*{description}" class="form-control" rows="2" placeholder="Example description"></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-uppercase small">Nội dung chi tiết</label>
                <textarea th:field="*{content}" class="form-control" rows="6" required></textarea>
            </div>


            <div class="form-group mb-3">
    <label class="form-label fw-bold">URL HÌNH ẢNH</label>
    <input type="text" name="imageUrl" class="form-control" 
           th:value="${post.imageUrl}" 
           id="imageUrlInput"
           placeholder="Dán link ảnh tại đây (Ví dụ: https://picsum.photos/800/450)"
           oninput="document.getElementById('previewImg').src = this.value">
    
    <div class="mt-3">
        <label class="form-label text-muted small">ẢNH XEM TRƯỚC:</label>
        <div style="width: 200px; height: 120px; border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden; background: #f8f9fa;">
            <img id="previewImg" 
                 th:src="${post.imageUrl != null && post.imageUrl != '' ? post.imageUrl : 'https://via.placeholder.com/200x120?text=No+Image'}" 
                 style="width: 100%; height: 100%; object-fit: cover;">
        </div>
    </div>
</div>

<div class="d-flex justify-content-center gap-3 mt-4">
    <button type="submit" class="btn btn-primary px-4">Cập nhật</button>
    <a href="/admin/posts" class="btn btn-secondary px-4">Quay lại</a>
</div>

        </form>
    </div>
</div>

</body>
</html>
