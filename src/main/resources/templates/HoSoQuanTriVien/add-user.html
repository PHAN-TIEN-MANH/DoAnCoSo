<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin thành viên - NewsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --sidebar-bg: #111827; --primary: #38bdf8; --bg-body: #f8fafc;
            --white: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-body); display: flex; min-height: 100vh; color: var(--text-main); font-size: 14px; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar-bg); min-height: 100vh; color: white; position: fixed; display: flex; flex-direction: column; z-index: 1000; }
        .logo { padding: 35px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); text-decoration: none; display: block; }
        .logo h2 { margin: 0; color: var(--primary); font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 12px; }
        .menu-scroll { flex: 1; padding-top: 10px; }
        .menu-label { padding: 20px 25px 8px; font-size: 11px; text-transform: uppercase; color: #4b5563; font-weight: 700; letter-spacing: 1px; }
        .menu-item { padding: 10px 25px; display: flex; align-items: center; gap: 12px; color: #94a3b8; text-decoration: none; transition: 0.2s; }
        .menu-item:hover { color: white; background: rgba(255,255,255,0.03); }
        .menu-item.active { background: rgba(56, 189, 248, 0.1); color: var(--primary); font-weight: 600; border-left: 3px solid var(--primary); }

        .sidebar-footer { margin-top: auto; padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .logout-item { padding: 12px 25px; display: flex; align-items: center; gap: 12px; color: #f87171; text-decoration: none; font-weight: 600; }

        /* MAIN CONTENT */
        .main-content { margin-left: 260px; flex: 1; padding: 0 35px 35px; min-width: 0; }
        
        /* TOP NAV */
        .top-nav { background: transparent; margin: 20px 0 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .breadcrumb { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .breadcrumb span { color: var(--primary); font-weight: 600; }
        
        .admin-profile { display: flex; align-items: center; gap: 10px; }
        .admin-profile .info { text-align: right; }
        .admin-profile .name { display: block; font-weight: 700; font-size: 14px; color: #1e293b; margin-bottom: -2px; }
        .admin-profile .role { display: block; font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        .admin-profile .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid #e0f2fe; box-shadow: 0 0 0 1px #38bdf8; }

        /* HEADER ACTION */
        .header-action-row { display: flex; align-items: center; gap: 20px; margin: 20px 0 30px 0; }
        .btn-back { 
            display: flex; align-items: center; gap: 8px; text-decoration: none; 
            color: #475569; font-weight: 600; padding: 10px 18px; border-radius: 12px; 
            background: white; border: 1px solid var(--border); transition: 0.2s; font-size: 14px;
        }
        .btn-back:hover { background: #f1f5f9; transform: translateX(-3px); }
        .page-title { font-size: 26px; font-weight: 800; margin: 0; color: #0f172a; }

        /* FORM CARD */
        .admin-card { background: var(--white); border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); padding: 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { 
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); 
            outline: none; transition: 0.3s; font-family: inherit; font-size: 14px; font-weight: 500;
            box-sizing: border-box;
        }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }
        
        .submit-btn { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            background: var(--primary); color: #0f172a; font-weight: 800; 
            font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .submit-btn:hover { background: #0ea5e9; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.3); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a th:href="@{/admin/dashboard}" class="logo">
            <h2><i class="fa-solid fa-newspaper"></i> NewsApp</h2>
        </a>
        <div class="menu-scroll">
            <div class="menu-label">CHÍNH</div>
            <a th:href="@{/admin/dashboard}" class="menu-item"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
            <div class="menu-label">NỘI DUNG</div>
            <a th:href="@{/admin/posts}" class="menu-item"><i class="fa-solid fa-file-lines"></i> Bài viết</a>
            <a th:href="@{/admin/categories}" class="menu-item"><i class="fa-solid fa-layer-group"></i> Chuyên mục</a>
            <a th:href="@{/admin/comments}" class="menu-item"><i class="fa-solid fa-comment-dots"></i> Bình luận</a>
            <div class="menu-label">HỆ THỐNG</div>
            <a th:href="@{/admin/users}" class="menu-item active"><i class="fa-solid fa-user-group"></i> Người dùng</a>
            <a th:href="@{/admin/settings}" class="menu-item"><i class="fa-solid fa-gear"></i> Cài đặt</a>
        </div>

    </aside>

    <main class="main-content">
        <div class="top-nav">
            <div class="breadcrumb">Quản trị / <span>Người dùng</span></div>
            <div class="admin-profile">
                <div class="info">
                    <span class="name" th:text="${session.username}">Quản trị viên</span>
                    <span class="role">ADMINISTRATOR</span>
                </div>
                <div class="avatar" th:text="${#strings.substring(session.username,0,2).toUpperCase()}">QV</div>
            </div>
        </div>

        <div class="header-action-row">
            <a th:href="@{/admin/users}" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
            <h1 class="page-title" th:text="${user.id != null ? 'Cập nhật thành viên' : 'Thêm thành viên'}">Thành viên</h1>
        </div>

        <div style="max-width: 650px; margin: 0 auto;">
            <div class="admin-card">
                <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="form-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" th:field="*{username}" class="form-input" placeholder="Nhập username..." required>
                    </div>

                    <div class="form-group">
                        <label>Email liên hệ</label>
                        <input type="email" th:field="*{email}" class="form-input" placeholder="example@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" th:field="*{password}" class="form-input" placeholder="Nhập mật khẩu..." required>
                    </div>

                    <div class="form-group">
                        <label>Vai trò hệ thống</label>
                        <select th:field="*{role}" class="form-input">
                            <option value="USER">Người dùng (USER)</option>
                            <option value="ADMIN">Quản trị viên (ADMIN)</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="fa-solid fa-check"></i> 
                        <span th:text="${user.id != null ? 'Cập nhật thông tin' : 'Lưu thành viên'}">Lưu</span>
                    </button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
